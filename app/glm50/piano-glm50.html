<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electronic Piano</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        h1 {
            color: #e94560;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .instructions {
            color: #ddd;
            margin-bottom: 20px;
            text-align: center;
            font-size: 14px;
        }

        .piano-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: linear-gradient(180deg, #2d2d2d 0%, #1a1a1a 100%);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .octave {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .octave-label {
            color: #888;
            font-size: 12px;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .keys {
            display: flex;
            position: relative;
        }

        .key {
            width: 50px;
            height: 150px;
            background: linear-gradient(180deg, #f5f5f5 0%, #e0e0e0 100%);
            border: 1px solid #999;
            border-radius: 0 0 5px 5px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding-bottom: 10px;
            transition: all 0.05s ease;
            box-shadow: 0 5px 10px rgba(0,0,0,0.3);
        }

        .key:hover {
            background: linear-gradient(180deg, #fff 0%, #f0f0f0 100%);
        }

        .key.active {
            background: linear-gradient(180deg, #e94560 0%, #c73e54 100%);
            transform: translateY(2px);
            box-shadow: 0 3px 5px rgba(0,0,0,0.3);
        }

        .key .note-name {
            font-size: 14px;
            font-weight: bold;
            color: #333;
        }

        .key .key-binding {
            font-size: 10px;
            color: #666;
            margin-top: 3px;
        }

        .key.active .note-name,
        .key.active .key-binding {
            color: #fff;
        }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
            color: #ddd;
        }

        .volume-control input {
            width: 150px;
            cursor: pointer;
        }

        .waveform-select {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
            color: #ddd;
        }

        .waveform-select select {
            padding: 5px 10px;
            border-radius: 5px;
            border: none;
            background: #333;
            color: #fff;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>🎹 Electronic Piano</h1>
    <p class="instructions">
        Click keys or use keyboard shortcuts to play!<br>
        Lower: Z-M | Middle: A-J | Higher: Q-U
    </p>

    <div class="piano-container">
        <!-- Lower Octave -->
        <div class="octave">
            <div class="octave-label">Lower Octave</div>
            <div class="keys" id="lower-octave"></div>
        </div>

        <!-- Middle Octave -->
        <div class="octave">
            <div class="octave-label">Middle Octave</div>
            <div class="keys" id="middle-octave"></div>
        </div>

        <!-- Higher Octave -->
        <div class="octave">
            <div class="octave-label">Higher Octave</div>
            <div class="keys" id="higher-octave"></div>
        </div>
    </div>

    <div class="volume-control">
        <label for="volume">🔊 Volume:</label>
        <input type="range" id="volume" min="0" max="100" value="50">
        <span id="volume-value">50%</span>
    </div>

    <div class="waveform-select">
        <label for="waveform">🎵 Sound:</label>
        <select id="waveform">
            <option value="sine">Sine (Smooth)</option>
            <option value="triangle">Triangle (Mellow)</option>
            <option value="square">Square (Retro)</option>
            <option value="sawtooth">Sawtooth (Bright)</option>
        </select>
    </div>

    <script>
        // Audio Context
        let audioContext = null;

        // Note frequencies (C4 = 261.63 Hz as middle C)
        const noteNames = ['C', 'D', 'E', 'F', 'G', 'A', 'B'];
        const noteNumbers = [1, 2, 3, 4, 5, 6, 7];

        // Calculate frequencies based on octave
        function getFrequency(noteIndex, octave) {
            // C4 (middle C) = 261.63 Hz
            // Formula: f = 261.63 * 2^(n/12) where n is semitones from C4
            const semitonesFromC4 = (octave - 4) * 12 + noteIndex * 2 - (noteIndex > 2 ? 1 : 0);
            // Adjust for semitone pattern: C=0, D=2, E=4, F=5, G=7, A=9, B=11
            const semitoneOffsets = [0, 2, 4, 5, 7, 9, 11];
            const semitones = (octave - 4) * 12 + semitoneOffsets[noteIndex];
            return 261.63 * Math.pow(2, semitones / 12);
        }

        // Keyboard mappings
        const keyBindings = {
            // Lower octave (Z-M)
            'z': { octave: 'lower', note: 0 },
            'x': { octave: 'lower', note: 1 },
            'c': { octave: 'lower', note: 2 },
            'v': { octave: 'lower', note: 3 },
            'b': { octave: 'lower', note: 4 },
            'n': { octave: 'lower', note: 5 },
            'm': { octave: 'lower', note: 6 },
            // Middle octave (A-J)
            'a': { octave: 'middle', note: 0 },
            's': { octave: 'middle', note: 1 },
            'd': { octave: 'middle', note: 2 },
            'f': { octave: 'middle', note: 3 },
            'g': { octave: 'middle', note: 4 },
            'h': { octave: 'middle', note: 5 },
            'j': { octave: 'middle', note: 6 },
            // Higher octave (Q-U)
            'q': { octave: 'higher', note: 0 },
            'w': { octave: 'higher', note: 1 },
            'e': { octave: 'higher', note: 2 },
            'r': { octave: 'higher', note: 3 },
            't': { octave: 'higher', note: 4 },
            'y': { octave: 'higher', note: 5 },
            'u': { octave: 'higher', note: 6 },
        };

        // Display key bindings
        const displayKeys = {
            'lower': ['Z', 'X', 'C', 'V', 'B', 'N', 'M'],
            'middle': ['A', 'S', 'D', 'F', 'G', 'H', 'J'],
            'higher': ['Q', 'W', 'E', 'R', 'T', 'Y', 'U']
        };

        // Octave numbers
        const octaveNumbers = {
            'lower': 3,
            'middle': 4,
            'higher': 5
        };

        // Volume
        let volume = 0.5;

        // Waveform type
        let waveform = 'sine';

        // Active oscillators
        const activeOscillators = {};

        // Initialize audio context
        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        // Play a note
        function playNote(octave, noteIndex) {
            initAudio();

            const noteId = `${octave}-${noteIndex}`;
            
            // Stop if already playing
            if (activeOscillators[noteId]) {
                stopNote(octave, noteIndex);
            }

            const frequency = getFrequency(noteIndex, octaveNumbers[octave]);

            // Create oscillator
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.type = waveform;
            oscillator.frequency.setValueAtTime(frequency, audioContext.currentTime);

            // ADSR envelope
            gainNode.gain.setValueAtTime(0, audioContext.currentTime);
            gainNode.gain.linearRampToValueAtTime(volume, audioContext.currentTime + 0.01);
            gainNode.gain.linearRampToValueAtTime(volume * 0.7, audioContext.currentTime + 0.1);

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.start();

            activeOscillators[noteId] = { oscillator, gainNode };

            // Visual feedback
            const keyElement = document.querySelector(`[data-note="${noteId}"]`);
            if (keyElement) {
                keyElement.classList.add('active');
            }
        }

        // Stop a note
        function stopNote(octave, noteIndex) {
            const noteId = `${octave}-${noteIndex}`;

            if (activeOscillators[noteId]) {
                const { oscillator, gainNode } = activeOscillators[noteId];
                
                // Fade out
                gainNode.gain.linearRampToValueAtTime(0, audioContext.currentTime + 0.1);
                
                setTimeout(() => {
                    oscillator.stop();
                    oscillator.disconnect();
                    gainNode.disconnect();
                }, 100);

                delete activeOscillators[noteId];
            }

            // Remove visual feedback
            const keyElement = document.querySelector(`[data-note="${noteId}"]`);
            if (keyElement) {
                keyElement.classList.remove('active');
            }
        }

        // Create keys for an octave
        function createOctaveKeys(octaveName, containerId) {
            const container = document.getElementById(containerId);

            noteNames.forEach((note, index) => {
                const key = document.createElement('div');
                key.className = 'key';
                key.dataset.note = `${octaveName}-${index}`;
                key.innerHTML = `
                    <span class="note-name">${note}${noteNumbers[index]}</span>
                    <span class="key-binding">${displayKeys[octaveName][index]}</span>
                `;

                // Mouse events
                key.addEventListener('mousedown', (e) => {
                    e.preventDefault();
                    playNote(octaveName, index);
                });
                key.addEventListener('mouseup', () => stopNote(octaveName, index));
                key.addEventListener('mouseleave', () => stopNote(octaveName, index));

                // Touch events
                key.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    playNote(octaveName, index);
                });
                key.addEventListener('touchend', () => stopNote(octaveName, index));

                container.appendChild(key);
            });
        }

        // Initialize piano
        function initPiano() {
            createOctaveKeys('lower', 'lower-octave');
            createOctaveKeys('middle', 'middle-octave');
            createOctaveKeys('higher', 'higher-octave');
        }

        // Keyboard events
        document.addEventListener('keydown', (e) => {
            if (e.repeat) return;

            const key = e.key.toLowerCase();
            if (keyBindings[key]) {
                const { octave, note } = keyBindings[key];
                playNote(octave, note);
            }
        });

        document.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (keyBindings[key]) {
                const { octave, note } = keyBindings[key];
                stopNote(octave, note);
            }
        });

        // Volume control
        const volumeSlider = document.getElementById('volume');
        const volumeValue = document.getElementById('volume-value');

        volumeSlider.addEventListener('input', (e) => {
            volume = e.target.value / 100;
            volumeValue.textContent = `${e.target.value}%`;
        });

        // Waveform control
        const waveformSelect = document.getElementById('waveform');
        waveformSelect.addEventListener('change', (e) => {
            waveform = e.target.value;
        });

        // Initialize
        initPiano();
    </script>
</body>
</html>
