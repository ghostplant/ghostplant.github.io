<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aircraft</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a1a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }
  #gameContainer {
    position: relative;
  }
  canvas {
    display: block;
    border: 2px solid #1a3a5c;
    border-radius: 4px;
    box-shadow: 0 0 30px rgba(0, 150, 255, 0.2), 0 0 60px rgba(0, 150, 255, 0.1);
  }
  #ui {
    position: absolute;
    top: 10px;
    left: 10px;
    right: 10px;
    display: flex;
    justify-content: space-between;
    pointer-events: none;
    z-index: 10;
  }
  #ui div {
    color: #c0deff;
    font-size: 16px;
    font-weight: 600;
    text-shadow: 0 0 10px rgba(0, 150, 255, 0.5);
    letter-spacing: 1px;
  }
  #overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: rgba(5, 5, 20, 0.85);
    z-index: 20;
    transition: opacity 0.3s;
  }
  #overlay.hidden { display: none; }
  #overlay h1 {
    color: #4af;
    font-size: 48px;
    margin-bottom: 10px;
    text-shadow: 0 0 20px rgba(0, 150, 255, 0.7);
    letter-spacing: 3px;
  }
  #overlay h2 {
    color: #f55;
    font-size: 36px;
    margin-bottom: 10px;
    text-shadow: 0 0 20px rgba(255, 80, 80, 0.7);
  }
  #overlay p {
    color: #8ab;
    font-size: 16px;
    margin-bottom: 6px;
  }
  #overlay .score-display {
    color: #ff0;
    font-size: 22px;
    margin: 10px 0;
    text-shadow: 0 0 15px rgba(255, 255, 0, 0.5);
  }
  #overlay button {
    margin-top: 20px;
    padding: 12px 40px;
    font-size: 18px;
    font-weight: 700;
    color: #fff;
    background: linear-gradient(135deg, #1a5276, #2e86c1);
    border: 2px solid #4af;
    border-radius: 8px;
    cursor: pointer;
    letter-spacing: 2px;
    transition: all 0.2s;
    pointer-events: all;
  }
  #overlay button:hover {
    background: linear-gradient(135deg, #2e86c1, #4af);
    box-shadow: 0 0 20px rgba(0, 150, 255, 0.5);
    transform: scale(1.05);
  }
  #controls-info {
    margin-top: 15px;
    text-align: center;
  }
  #controls-info p {
    font-size: 13px;
    color: #6a8fa8;
    margin: 3px 0;
  }
  #controls-info span {
    color: #4af;
    font-weight: 600;
  }
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="gameCanvas"></canvas>
  <div id="ui">
    <div id="scoreDisplay">SCORE: 0</div>
    <div id="levelDisplay">WAVE: 1</div>
    <div id="livesDisplay">LIVES: 3</div>
  </div>
  <div id="overlay">
    <h1>✈ AIRCRAFT</h1>
    <p>Survive the onslaught. Destroy everything.</p>
    <div id="controls-info">
      <p><span>← → ↑ ↓</span> or <span>W A S D</span> — Move</p>
      <p><span>SPACE</span> — Shoot</p>
      <p><span>B</span> — Bomb (limited)</p>
    </div>
    <button id="startBtn">LAUNCH</button>
  </div>
</div>

<script>
// ============ GAME CONFIG ============
const CFG = {
  W: 480,
  H: 700,
  playerSpeed: 5,
  bulletSpeed: 9,
  enemyBulletSpeed: 4,
  fireRate: 8,
  bombCount: 3,
  starCount: 120,
  particleCount: 15,
};

// ============ CANVAS SETUP ============
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = CFG.W;
canvas.height = CFG.H;

const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('startBtn');
const scoreDisplay = document.getElementById('scoreDisplay');
const levelDisplay = document.getElementById('levelDisplay');
const livesDisplay = document.getElementById('livesDisplay');

// ============ GAME STATE ============
let game = {};
let keys = {};

function resetGame() {
  game = {
    running: false,
    paused: false,
    score: 0,
    lives: 3,
    wave: 1,
    bombs: CFG.bombCount,
    fireCooldown: 0,
    waveTimer: 0,
    waveDelay: 180,
    enemiesInWave: 0,
    enemiesSpawned: 0,
    spawnTimer: 0,
    shakeTimer: 0,
    shakeIntensity: 0,
    flashTimer: 0,
    player: {
      x: CFG.W / 2,
      y: CFG.H - 80,
      w: 36,
      h: 40,
      invincible: 0,
      powerLevel: 0,
      powerTimer: 0,
    },
    bullets: [],
    enemyBullets: [],
    enemies: [],
    particles: [],
    powerups: [],
    stars: [],
  };
  // Init stars
  for (let i = 0; i < CFG.starCount; i++) {
    game.stars.push({
      x: Math.random() * CFG.W,
      y: Math.random() * CFG.H,
      speed: 0.3 + Math.random() * 1.5,
      size: 0.5 + Math.random() * 1.5,
      brightness: 0.3 + Math.random() * 0.7,
    });
  }
}

// ============ INPUT ============
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

// ============ HELPERS ============
function rand(a, b) { return a + Math.random() * (b - a); }
function randInt(a, b) { return Math.floor(rand(a, b + 1)); }
function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }
function rectCollide(a, b) {
  return a.x - a.w/2 < b.x + b.w/2 && a.x + a.w/2 > b.x - b.w/2 &&
         a.y - a.h/2 < b.y + b.h/2 && a.y + a.h/2 > b.y - b.h/2;
}

function spawnParticles(x, y, color, count, speed) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = rand(0.5, speed);
    game.particles.push({
      x, y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd,
      life: rand(15, 40),
      maxLife: 40,
      size: rand(1.5, 4),
      color,
    });
  }
}

function screenShake(intensity, duration) {
  game.shakeIntensity = intensity;
  game.shakeTimer = duration;
}

// ============ ENEMY TYPES ============
const ENEMY_TYPES = {
  scout: { w: 24, h: 24, hp: 1, speed: 2, score: 100, color: '#f55', shootRate: 0 },
  fighter: { w: 30, h: 30, hp: 2, speed: 1.5, score: 200, color: '#fa5', shootRate: 120 },
  bomber: { w: 40, h: 36, hp: 5, speed: 0.8, score: 500, color: '#f5f', shootRate: 90 },
  ace: { w: 32, h: 32, hp: 3, speed: 2.5, score: 350, color: '#5ff', shootRate: 60 },
};

function spawnEnemy() {
  const wave = game.wave;
  let type;
  const r = Math.random();
  if (wave <= 2) {
    type = r < 0.7 ? 'scout' : 'fighter';
  } else if (wave <= 4) {
    type = r < 0.4 ? 'scout' : r < 0.75 ? 'fighter' : r < 0.9 ? 'ace' : 'bomber';
  } else {
    type = r < 0.2 ? 'scout' : r < 0.5 ? 'fighter' : r < 0.75 ? 'ace' : 'bomber';
  }

  const def = ENEMY_TYPES[type];
  const hpMult = 1 + (wave - 1) * 0.15;
  const enemy = {
    type,
    x: rand(def.w, CFG.W - def.w),
    y: -def.h,
    w: def.w,
    h: def.h,
    hp: Math.ceil(def.hp * hpMult),
    maxHp: Math.ceil(def.hp * hpMult),
    speed: def.speed + (wave - 1) * 0.05,
    score: def.score,
    color: def.color,
    shootTimer: randInt(30, def.shootRate || 999),
    shootRate: def.shootRate,
    movePattern: randInt(0, 2),
    moveTimer: 0,
    baseX: 0,
  };
  enemy.baseX = enemy.x;
  game.enemies.push(enemy);
}

// ============ POWERUP ============
function spawnPowerup(x, y) {
  if (Math.random() > 0.2) return;
  const types = ['power', 'life', 'bomb'];
  const weights = [0.55, 0.2, 0.25];
  let r = Math.random(), cum = 0, type = 'power';
  for (let i = 0; i < types.length; i++) {
    cum += weights[i];
    if (r < cum) { type = types[i]; break; }
  }
  game.powerups.push({ x, y, type, w: 18, h: 18, vy: 1.5, life: 400 });
}

// ============ DRAWING ============
function drawPlayer(p) {
  ctx.save();
  ctx.translate(p.x, p.y);

  // Invincibility flash
  if (p.invincible > 0 && Math.floor(p.invincible / 3) % 2 === 0) {
    ctx.globalAlpha = 0.4;
  }

  // Engine glow
  const glow = 4 + Math.sin(Date.now() * 0.02) * 2;
  const grad = ctx.createRadialGradient(0, p.h/2 + 2, 0, 0, p.h/2 + 2, 14 + glow);
  grad.addColorStop(0, 'rgba(100,180,255,0.9)');
  grad.addColorStop(0.4, 'rgba(50,120,255,0.4)');
  grad.addColorStop(1, 'rgba(0,60,200,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(-12, p.h/2 - 4, 24, 20 + glow);

  // Engine flames
  ctx.fillStyle = '#4af';
  ctx.beginPath();
  ctx.moveTo(-6, p.h/2);
  ctx.lineTo(-3, p.h/2 + 8 + glow);
  ctx.lineTo(0, p.h/2 + 2);
  ctx.lineTo(3, p.h/2 + 8 + glow);
  ctx.lineTo(6, p.h/2);
  ctx.fill();

  // Body
  ctx.fillStyle = '#2c3e50';
  ctx.strokeStyle = '#4af';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(0, -p.h/2);           // Nose
  ctx.lineTo(8, -p.h/2 + 14);
  ctx.lineTo(p.w/2, p.h/2 - 6);    // Right wing tip
  ctx.lineTo(6, p.h/2);
  ctx.lineTo(-6, p.h/2);
  ctx.lineTo(-p.w/2, p.h/2 - 6);   // Left wing tip
  ctx.lineTo(-8, -p.h/2 + 14);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // Cockpit
  ctx.fillStyle = '#6cf';
  ctx.beginPath();
  ctx.ellipse(0, -p.h/2 + 14, 4, 7, 0, 0, Math.PI * 2);
  ctx.fill();

  // Wing detail
  ctx.strokeStyle = '#3a5a7c';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(-p.w/2 + 3, p.h/2 - 8);
  ctx.lineTo(-5, -p.h/2 + 18);
  ctx.moveTo(p.w/2 - 3, p.h/2 - 8);
  ctx.lineTo(5, -p.h/2 + 18);
  ctx.stroke();

  // Power level indicators
  if (p.powerLevel >= 1) {
    ctx.fillStyle = '#ff0';
    ctx.shadowColor = '#ff0';
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.arc(-p.w/2 + 2, p.h/2 - 10, 2, 0, Math.PI * 2);
    ctx.arc(p.w/2 - 2, p.h/2 - 10, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }
  if (p.powerLevel >= 2) {
    ctx.fillStyle = '#f80';
    ctx.shadowColor = '#f80';
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.arc(0, -p.h/2 + 6, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  ctx.restore();
}

function drawEnemy(e) {
  ctx.save();
  ctx.translate(e.x, e.y);

  // Health bar
  if (e.hp < e.maxHp) {
    const bw = e.w + 4;
    ctx.fillStyle = '#300';
    ctx.fillRect(-bw/2, -e.h/2 - 8, bw, 3);
    ctx.fillStyle = '#f44';
    ctx.fillRect(-bw/2, -e.h/2 - 8, bw * (e.hp / e.maxHp), 3);
  }

  // Body based on type
  ctx.fillStyle = e.color;
  ctx.strokeStyle = '#fff3';
  ctx.lineWidth = 1;

  if (e.type === 'scout') {
    ctx.beginPath();
    ctx.moveTo(0, e.h/2);
    ctx.lineTo(-e.w/2, -e.h/2 + 4);
    ctx.lineTo(0, -e.h/2);
    ctx.lineTo(e.w/2, -e.h/2 + 4);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
  } else if (e.type === 'fighter') {
    ctx.beginPath();
    ctx.moveTo(0, e.h/2);
    ctx.lineTo(-e.w/2, 2);
    ctx.lineTo(-e.w/2 + 4, -e.h/2);
    ctx.lineTo(0, -e.h/2 + 6);
    ctx.lineTo(e.w/2 - 4, -e.h/2);
    ctx.lineTo(e.w/2, 2);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    // Cockpit
    ctx.fillStyle = '#fff5';
    ctx.beginPath();
    ctx.arc(0, 4, 3, 0, Math.PI * 2);
    ctx.fill();
  } else if (e.type === 'bomber') {
    ctx.beginPath();
    ctx.moveTo(0, e.h/2);
    ctx.lineTo(-e.w/2, e.h/4);
    ctx.lineTo(-e.w/2 + 2, -e.h/2);
    ctx.lineTo(e.w/2 - 2, -e.h/2);
    ctx.lineTo(e.w/2, e.h/4);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    // Details
    ctx.fillStyle = '#0003';
    ctx.fillRect(-e.w/2 + 6, -e.h/2 + 4, e.w - 12, e.h/2 - 4);
  } else if (e.type === 'ace') {
    ctx.beginPath();
    ctx.moveTo(0, e.h/2);
    ctx.lineTo(-e.w/2, 0);
    ctx.lineTo(-e.w/3, -e.h/2);
    ctx.lineTo(0, -e.h/2 + 4);
    ctx.lineTo(e.w/3, -e.h/2);
    ctx.lineTo(e.w/2, 0);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    // Glow
    ctx.shadowColor = e.color;
    ctx.shadowBlur = 10;
    ctx.strokeStyle = e.color + '88';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  ctx.restore();
}

function drawBullet(b) {
  ctx.save();
  ctx.translate(b.x, b.y);
  if (b.isEnemy) {
    ctx.fillStyle = '#f55';
    ctx.shadowColor = '#f55';
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(0, 0, 3, 0, Math.PI * 2);
    ctx.fill();
  } else {
    ctx.fillStyle = '#4f4';
    ctx.shadowColor = '#4f4';
    ctx.shadowBlur = 6;
    ctx.fillRect(-1.5, -5, 3, 10);
  }
  ctx.shadowBlur = 0;
  ctx.restore();
}

function drawPowerup(p) {
  ctx.save();
  ctx.translate(p.x, p.y);
  const pulse = 1 + Math.sin(Date.now() * 0.008) * 0.15;
  ctx.scale(pulse, pulse);

  let color, symbol;
  if (p.type === 'power') { color = '#ff0'; symbol = 'P'; }
  else if (p.type === 'life') { color = '#f44'; symbol = '♥'; }
  else { color = '#4af'; symbol = 'B'; }

  ctx.shadowColor = color;
  ctx.shadowBlur = 12;
  ctx.strokeStyle = color;
  ctx.fillStyle = color + '33';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(0, 0, 10, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();

  ctx.shadowBlur = 0;
  ctx.fillStyle = color;
  ctx.font = 'bold 12px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(symbol, 0, 1);

  ctx.restore();
}

function drawStars() {
  for (const s of game.stars) {
    ctx.fillStyle = `rgba(180,200,255,${s.brightness})`;
    ctx.fillRect(s.x, s.y, s.size, s.size);
  }
}

function drawParticles() {
  for (const p of game.particles) {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 4;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;
}

function drawBombIndicator() {
  ctx.save();
  ctx.fillStyle = '#4af';
  ctx.font = 'bold 14px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('BOMBS: ', 10, CFG.H - 15);
  for (let i = 0; i < game.bombs; i++) {
    ctx.fillStyle = '#4af';
    ctx.shadowColor = '#4af';
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.arc(85 + i * 20, CFG.H - 19, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }
  ctx.restore();
}

// ============ UPDATE ============
function update() {
  const p = game.player;

  // Player movement
  let dx = 0, dy = 0;
  if (keys['ArrowLeft'] || keys['KeyA']) dx -= CFG.playerSpeed;
  if (keys['ArrowRight'] || keys['KeyD']) dx += CFG.playerSpeed;
  if (keys['ArrowUp'] || keys['KeyW']) dy -= CFG.playerSpeed;
  if (keys['ArrowDown'] || keys['KeyS']) dy += CFG.playerSpeed;

  // Diagonal normalization
  if (dx !== 0 && dy !== 0) {
    dx *= 0.707;
    dy *= 0.707;
  }

  p.x = Math.max(p.w/2, Math.min(CFG.W - p.w/2, p.x + dx));
  p.y = Math.max(p.h/2, Math.min(CFG.H - p.h/2, p.y + dy));

  // Shooting
  if (game.fireCooldown > 0) game.fireCooldown--;
  if (keys['Space'] && game.fireCooldown <= 0) {
    game.fireCooldown = CFG.fireRate;
    // Center bullet always
    game.bullets.push({ x: p.x, y: p.y - p.h/2, vy: -CFG.bulletSpeed, vx: 0, isEnemy: false });
    // Power level 1: side bullets
    if (p.powerLevel >= 1) {
      game.bullets.push({ x: p.x - 12, y: p.y - p.h/2 + 6, vy: -CFG.bulletSpeed, vx: -0.5, isEnemy: false });
      game.bullets.push({ x: p.x + 12, y: p.y - p.h/2 + 6, vy: -CFG.bulletSpeed, vx: 0.5, isEnemy: false });
    }
    // Power level 2: extra spread
    if (p.powerLevel >= 2) {
      game.bullets.push({ x: p.x - 8, y: p.y - p.h/2 + 2, vy: -CFG.bulletSpeed * 0.9, vx: -1.5, isEnemy: false });
      game.bullets.push({ x: p.x + 8, y: p.y - p.h/2 + 2, vy: -CFG.bulletSpeed * 0.9, vx: 1.5, isEnemy: false });
    }
  }

  // Bomb
  if (keys['KeyB'] && game.bombs > 0 && !game._bombHeld) {
    game.bombs--;
    game._bombHeld = true;
    screenShake(8, 20);
    game.flashTimer = 10;
    // Damage all enemies
    for (const e of game.enemies) {
      e.hp -= 10;
      spawnParticles(e.x, e.y, e.color, 8, 3);
    }
    // Clear enemy bullets
    for (const b of game.enemyBullets) {
      spawnParticles(b.x, b.y, '#f55', 3, 2);
    }
    game.enemyBullets = [];
  }
  if (!keys['KeyB']) game._bombHeld = false;

  // Power timer
  if (p.powerTimer > 0) {
    p.powerTimer--;
    if (p.powerTimer <= 0) p.powerLevel = Math.max(0, p.powerLevel - 1);
  }

  // Invincibility
  if (p.invincible > 0) p.invincible--;

  // Update bullets
  for (const b of game.bullets) {
    b.x += (b.vx || 0);
    b.y += b.vy;
  }
  game.bullets = game.bullets.filter(b => b.y > -20 && b.y < CFG.H + 20 && b.x > -20 && b.x < CFG.W + 20);

  for (const b of game.enemyBullets) {
    b.x += (b.vx || 0);
    b.y += b.vy;
  }
  game.enemyBullets = game.enemyBullets.filter(b => b.y > -20 && b.y < CFG.H + 20 && b.x > -20 && b.x < CFG.W + 20);

  // Wave spawning
  if (game.enemies.length === 0 && game.enemiesSpawned >= game.enemiesInWave) {
    game.waveTimer++;
    if (game.waveTimer >= game.waveDelay) {
      game.wave++;
      game.waveTimer = 0;
      game.enemiesInWave = 4 + game.wave * 2;
      game.enemiesSpawned = 0;
      game.spawnTimer = 0;
    }
  } else if (game.enemiesSpawned < game.enemiesInWave) {
    game.spawnTimer++;
    const spawnInterval = Math.max(15, 50 - game.wave * 3);
    if (game.spawnTimer >= spawnInterval) {
      game.spawnTimer = 0;
      spawnEnemy();
      game.enemiesSpawned++;
    }
  }

  // Update enemies
  for (const e of game.enemies) {
    e.moveTimer++;
    // Movement patterns
    if (e.movePattern === 0) {
      e.y += e.speed;
    } else if (e.movePattern === 1) {
      e.y += e.speed;
      e.x = e.baseX + Math.sin(e.moveTimer * 0.03) * 60;
    } else {
      e.y += e.speed * 0.7;
      e.x = e.baseX + Math.sin(e.moveTimer * 0.05) * 40;
      if (e.moveTimer > 60) e.y += e.speed * 0.5;
    }

    // Keep in bounds horizontally
    e.x = Math.max(e.w/2, Math.min(CFG.W - e.w/2, e.x));

    // Shooting
    if (e.shootRate > 0) {
      e.shootTimer--;
      if (e.shootTimer <= 0) {
        e.shootTimer = e.shootRate + randInt(-15, 15);
        const angle = Math.atan2(p.y - e.y, p.x - e.x);
        game.enemyBullets.push({
          x: e.x,
          y: e.y + e.h/2,
          vx: Math.cos(angle) * CFG.enemyBulletSpeed,
          vy: Math.sin(angle) * CFG.enemyBulletSpeed,
          isEnemy: true,
        });
      }
    }
  }

  // Bullet-enemy collisions
  for (let i = game.bullets.length - 1; i >= 0; i--) {
    const b = game.bullets[i];
    for (let j = game.enemies.length - 1; j >= 0; j--) {
      const e = game.enemies[j];
      if (rectCollide(
        { x: b.x, y: b.y, w: 6, h: 10 },
        { x: e.x, y: e.y, w: e.w, h: e.h }
      )) {
        game.bullets.splice(i, 1);
        e.hp--;
        spawnParticles(b.x, b.y, '#ff0', 3, 2);
        if (e.hp <= 0) {
          game.score += e.score;
          spawnParticles(e.x, e.y, e.color, CFG.particleCount, 4);
          spawnParticles(e.x, e.y, '#ff0', 8, 3);
          spawnPowerup(e.x, e.y);
          game.enemies.splice(j, 1);
        }
        break;
      }
    }
  }

  // Enemy bullet-player collision
  if (p.invincible <= 0) {
    for (let i = game.enemyBullets.length - 1; i >= 0; i--) {
      const b = game.enemyBullets[i];
      if (rectCollide(
        { x: b.x, y: b.y, w: 6, h: 6 },
        { x: p.x, y: p.y, w: p.w * 0.6, h: p.h * 0.6 }
      )) {
        game.enemyBullets.splice(i, 1);
        playerHit();
        break;
      }
    }
  }

  // Enemy-player collision
  if (p.invincible <= 0) {
    for (let i = game.enemies.length - 1; i >= 0; i--) {
      const e = game.enemies[i];
      if (rectCollide(
        { x: p.x, y: p.y, w: p.w * 0.5, h: p.h * 0.5 },
        { x: e.x, y: e.y, w: e.w, h: e.h }
      )) {
        e.hp -= 3;
        if (e.hp <= 0) {
          game.score += e.score;
          spawnParticles(e.x, e.y, e.color, CFG.particleCount, 4);
          game.enemies.splice(i, 1);
        }
        playerHit();
        break;
      }
    }
  }

  // Powerup collection
  for (let i = game.powerups.length - 1; i >= 0; i--) {
    const pw = game.powerups[i];
    pw.y += pw.vy;
    pw.life--;
    if (pw.y > CFG.H + 20 || pw.life <= 0) {
      game.powerups.splice(i, 1);
      continue;
    }
    if (dist(p, pw) < 22) {
      if (pw.type === 'power') {
        p.powerLevel = Math.min(2, p.powerLevel + 1);
        p.powerTimer = 600;
        spawnParticles(pw.x, pw.y, '#ff0', 10, 3);
      } else if (pw.type === 'life') {
        game.lives = Math.min(5, game.lives + 1);
        spawnParticles(pw.x, pw.y, '#f44', 10, 3);
      } else if (pw.type === 'bomb') {
        game.bombs = Math.min(5, game.bombs + 1);
        spawnParticles(pw.x, pw.y, '#4af', 10, 3);
      }
      game.powerups.splice(i, 1);
    }
  }

  // Remove off-screen enemies
  game.enemies = game.enemies.filter(e => e.y < CFG.H + 60);

  // Update particles
  for (const pt of game.particles) {
    pt.x += pt.vx;
    pt.y += pt.vy;
    pt.life--;
    pt.vx *= 0.97;
    pt.vy *= 0.97;
  }
  game.particles = game.particles.filter(pt => pt.life > 0);

  // Update stars
  for (const s of game.stars) {
    s.y += s.speed;
    if (s.y > CFG.H) {
      s.y = 0;
      s.x = Math.random() * CFG.W;
    }
  }

  // Shake
  if (game.shakeTimer > 0) game.shakeTimer--;
  if (game.flashTimer > 0) game.flashTimer--;

  // UI
  scoreDisplay.textContent = `SCORE: ${game.score}`;
  levelDisplay.textContent = `WAVE: ${game.wave}`;
  livesDisplay.textContent = `LIVES: ${game.lives}`;
}

function playerHit() {
  const p = game.player;
  game.lives--;
  p.invincible = 90;
  p.powerLevel = Math.max(0, p.powerLevel - 1);
  screenShake(6, 15);
  spawnParticles(p.x, p.y, '#f55', 20, 5);
  spawnParticles(p.x, p.y, '#ff0', 10, 3);

  if (game.lives <= 0) {
    gameOver();
  }
}

function gameOver() {
  game.running = false;
  overlay.classList.remove('hidden');
  overlay.innerHTML = `
    <h2>GAME OVER</h2>
    <div class="score-display">SCORE: ${game.score}</div>
    <div class="score-display">WAVE: ${game.wave}</div>
    <p>Better luck next time, pilot.</p>
    <button id="restartBtn">RETRY</button>
  `;
  document.getElementById('restartBtn').addEventListener('click', startGame);
}

// ============ RENDER ============
function render() {
  ctx.save();

  // Screen shake
  if (game.shakeTimer > 0) {
    const dx = (Math.random() - 0.5) * game.shakeIntensity;
    const dy = (Math.random() - 0.5) * game.shakeIntensity;
    ctx.translate(dx, dy);
  }

  // Background
  const bgGrad = ctx.createLinearGradient(0, 0, 0, CFG.H);
  bgGrad.addColorStop(0, '#050510');
  bgGrad.addColorStop(0.5, '#0a0a20');
  bgGrad.addColorStop(1, '#0f0f30');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(-10, -10, CFG.W + 20, CFG.H + 20);

  // Stars
  drawStars();

  // Powerups
  for (const pw of game.powerups) drawPowerup(pw);

  // Bullets
  for (const b of game.bullets) drawBullet(b);
  for (const b of game.enemyBullets) drawBullet(b);

  // Enemies
  for (const e of game.enemies) drawEnemy(e);

  // Player
  drawPlayer(game.player);

  // Particles (on top)
  drawParticles();

  // Bomb flash
  if (game.flashTimer > 0) {
    ctx.fillStyle = `rgba(100,180,255,${game.flashTimer / 20})`;
    ctx.fillRect(-10, -10, CFG.W + 20, CFG.H + 20);
  }

  // Bomb indicator
  drawBombIndicator();

  // Wave announcement
  if (game.waveTimer > 0 && game.waveTimer < 60 && game.enemies.length === 0 && game.enemiesSpawned >= game.enemiesInWave && game.wave > 1) {
    ctx.fillStyle = '#4af';
    ctx.font = 'bold 28px monospace';
    ctx.textAlign = 'center';
    ctx.shadowColor = '#4af';
    ctx.shadowBlur = 15;
    ctx.fillText(`WAVE ${game.wave - 1} CLEAR!`, CFG.W / 2, CFG.H / 2 - 20);
    ctx.shadowBlur = 0;
    ctx.font = '16px monospace';
    ctx.fillStyle = '#8ab';
    ctx.fillText('Incoming...', CFG.W / 2, CFG.H / 2 + 15);
  }

  ctx.restore();
}

// ============ GAME LOOP ============
function gameLoop() {
  if (game.running) {
    update();
    render();
  }
  requestAnimationFrame(gameLoop);
}

function startGame() {
  resetGame();
  game.running = true;
  game.enemiesInWave = 6;
  overlay.classList.add('hidden');
}

// ============ INIT ============
resetGame();
// Draw initial background
render();

startBtn.addEventListener('click', startGame);

gameLoop();
</script>
</body>
