<!DOCTYPE html>

<html lang="zh"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<title>SPH 双流体模拟 — 水与蜡</title>
<style>
*{margin:0;padding:0}
body{background:#060610;overflow:hidden;display:flex;flex-direction:column;
  align-items:center;justify-content:center;height:100vh}
canvas{display:block;cursor:crosshair;border-radius:6px;
  box-shadow:0 0 60px rgba(20,40,80,.3)}
#hud{position:fixed;top:10px;left:14px;color:#5a8;
  font:12px/1.9 'Courier New',monospace;
  pointer-events:none;user-select:none;text-shadow:0 1px 4px #000}
</style>
</head>
<body>
<div id="hud">
  FPS <span id="fps">111</span> | 粒子 <span id="pc">600</span><br>
  <span style="color:#5af">● 水（重·低粘）</span>
  <span style="color:#f80">● 蜡（轻·高粘）</span><br>
  鼠标拖动搅拌
</div>
<canvas id="c" width="800" height="600"></canvas>
<script>
'use strict';

// ===================== 画布 =====================
var cvs = document.getElementById('c'), ctx = cvs.getContext('2d');
var W = 800, HH = 600;
cvs.width = W; cvs.height = HH;

// ===================== SPH 参数 =====================
var NW = 300, NX = 300, N = NW + NX;  // 水/蜡粒子数
var H = 16, H2 = H * H;          // 平滑半径
var MASS = 20;                     // 粒子质量
var REST_W = 1.0, REST_X = 0.75;   // 静止密度 (水重/蜡轻)
var STIFF = 50000;                  // Tait 刚度 B
var VISC_W = 200, VISC_X = 2500;    // 粘度 (蜡高粘)
var GRAV = 300;                     // 重力 px/s^2
var DT = 0.004;                     // 时间步长
var SUBSTEPS = 8;                    // 每帧子步
var BOUNCE = -0.5;                   // 边界反弹阻尼
var P_RAD = 3.5;                     // 粒子渲染半径
var MAX_VEL = 600;                    // 速度上限

// ===================== 碗 (半圆·开口朝上) =====================
var BX = W / 2, BY = 150, BR = 230;

// ===================== 2D 核函数系数 =====================
var POLY6  = 4 / (Math.PI * H*H*H*H*H*H*H*H);
var SPIKY  = -30 / (Math.PI * H*H*H*H*H);
var VISC_L = 40 / (Math.PI * H*H*H*H*H);

// ===================== 粒子数据 (SoA) =====================
// pt[i]: 0=水, 1=蜡
var px  = new Float64Array(N), py  = new Float64Array(N);
var vx  = new Float64Array(N), vy  = new Float64Array(N);
var fxa = new Float64Array(N), fya = new Float64Array(N);
var rho = new Float64Array(N), prs = new Float64Array(N);
var pt  = new Uint8Array(N);

// ===================== 空间哈希网格 (counting-sort) =====================
var CELL = H;
var GW = (W / CELL | 0) + 2, GH = (HH / CELL | 0) + 2, GS = GW * GH;
var gCnt   = new Int32Array(GS);
var gStart = new Int32Array(GS);
var gCur   = new Int32Array(GS);
var gIds   = new Int32Array(N);

function buildGrid() {
  var i, cx, cy, gi;
  gCnt.fill(0);
  for (i = 0; i < N; i++) {
    cx = px[i] / CELL | 0;
    if (cx < 0) cx = 0; else if (cx >= GW) cx = GW - 1;
    cy = py[i] / CELL | 0;
    if (cy < 0) cy = 0; else if (cy >= GH) cy = GH - 1;
    gCnt[cy * GW + cx]++;
  }
  gStart[0] = 0;
  for (i = 1; i < GS; i++) gStart[i] = gStart[i - 1] + gCnt[i - 1];
  gCur.set(gStart);
  for (i = 0; i < N; i++) {
    cx = px[i] / CELL | 0;
    if (cx < 0) cx = 0; else if (cx >= GW) cx = GW - 1;
    cy = py[i] / CELL | 0;
    if (cy < 0) cy = 0; else if (cy >= GH) cy = GH - 1;
    gIds[gCur[cy * GW + cx]++] = i;
  }
}

// ===================== 初始化粒子 =====================
function initParticles() {
  var idx = 0, sp = 7, row, y, dy, halfW, x;

  // 水 — 从碗底向上排列
  for (row = 0; idx < NW; row++) {
    y = BY + BR - 8 - row * sp;
    if (y < BY + 10) break;
    dy = y - BY;
    halfW = Math.sqrt(Math.max(0, (BR - 6) * (BR - 6) - dy * dy));
    for (x = BX - halfW + 4; x <= BX + halfW - 4 && idx < NW; x += sp) {
      px[idx] = x + (Math.random() - 0.5);
      py[idx] = y + (Math.random() - 0.5);
      pt[idx] = 0; idx++;
    }
  }

  // 蜡 — 碗中上部 (初始在水面上方)
  for (row = 0; idx < N; row++) {
    y = BY + BR * 0.47 - row * sp;
    if (y < BY + 5) break;
    dy = y - BY;
    halfW = Math.sqrt(Math.max(0, (BR - 6) * (BR - 6) - dy * dy)) * 0.55;
    for (x = BX - halfW + 4; x <= BX + halfW - 4 && idx < N; x += sp) {
      px[idx] = x + (Math.random() - 0.5);
      py[idx] = y + (Math.random() - 0.5);
      pt[idx] = 1; idx++;
    }
  }

  // 补足剩余粒子
  while (idx < N) {
    var a = Math.random() * Math.PI;
    var r = Math.random() * (BR - 14);
    px[idx] = BX + r * Math.cos(a);
    py[idx] = BY + r * Math.sin(a);
    pt[idx] = idx < NW ? 0 : 1; idx++;
  }
  document.getElementById('pc').textContent = N;
}

// ===================== 密度 & 压力 (Tait方程) =====================
// p = B * ((rho/rho0)^2 - 1)   (gamma=2)
function computeDensityPressure() {
  var i, j, k, d, cx0, cy0, dcx, dcy, gi, s, e, rx, ry, r2, q;
  var range_s, range_e;

  for (i = 0; i < N; i++) {
    d = 0;
    cx0 = px[i] / CELL | 0;
    if (cx0 < 0) cx0 = 0; else if (cx0 >= GW) cx0 = GW - 1;
    cy0 = py[i] / CELL | 0;
    if (cy0 < 0) cy0 = 0; else if (cy0 >= GH) cy0 = GH - 1;

    for (dcx = -1; dcx <= 1; dcx++) {
      for (dcy = -1; dcy <= 1; dcy++) {
        var ncx = cx0 + dcx, ncy = cy0 + dcy;
        if (ncx < 0 || ncx >= GW || ncy < 0 || ncy >= GH) continue;
        gi = ncy * GW + ncx;
        s = gStart[gi]; e = s + gCnt[gi];
        for (k = s; k < e; k++) {
          j = gIds[k];
          rx = px[i] - px[j]; ry = py[i] - py[j];
          r2 = rx * rx + ry * ry;
          if (r2 < H2) { q = H2 - r2; d += MASS * POLY6 * q * q * q; }
        }
      }
    }

    rho[i] = d < 0.001 ? 0.001 : d;
    var rest = pt[i] === 0 ? REST_W : REST_X;
    var ratio = rho[i] / rest;
    var p = STIFF * (ratio * ratio - 1);
    prs[i] = p < -STIFF ? -STIFF : (p > STIFF * 10 ? STIFF * 10 : p);
  }
}

// ===================== 力计算 =====================
function computeForces() {
  var i, j, k, cx0, cy0, dcx, dcy, gi, s, e;
  var ncx, ncy, rx, ry, r2, r, invR;
  var rhoI, prsI, rhoI2, rhoJ, rhoJ2;
  var myVisc, pTerm, spikyGrad, viscLap;
  var fPX, fPY, fVX, fVY, dvx, dvy;

  for (i = 0; i < N; i++) { fxa[i] = 0; fya[i] = 0; }

  for (i = 0; i < N; i++) {
    fPX = 0; fPY = 0; fVX = 0; fVY = 0;

    cx0 = px[i] / CELL | 0;
    if (cx0 < 0) cx0 = 0; else if (cx0 >= GW) cx0 = GW - 1;
    cy0 = py[i] / CELL | 0;
    if (cy0 < 0) cy0 = 0; else if (cy0 >= GH) cy0 = GH - 1;

    myVisc = pt[i] === 0 ? VISC_W : VISC_X;
    rhoI = rho[i]; prsI = prs[i]; rhoI2 = rhoI * rhoI;

    for (dcx = -1; dcx <= 1; dcx++) {
      for (dcy = -1; dcy <= 1; dcy++) {
        ncx = cx0 + dcx; ncy = cy0 + dcy;
        if (ncx < 0 || ncx >= GW || ncy < 0 || ncy >= GH) continue;
        gi = ncy * GW + ncx;
        s = gStart[gi]; e = s + gCnt[gi];
        for (k = s; k < e; k++) {
          j = gIds[k];
          if (i === j) continue;
          rx = px[i] - px[j]; ry = py[i] - py[j];
          r2 = rx * rx + ry * ry;
          if (r2 >= H2 || r2 < 0.01) continue;

          r = Math.sqrt(r2);
          invR = 1 / r;
          rhoJ = rho[j]; rhoJ2 = rhoJ * rhoJ;

          // 压力力 (对称形式)
          pTerm = -(prsI / rhoI2 + prs[j] / rhoJ2);
          spikyGrad = SPIKY * (H - r) * (H - r);
          fPX += MASS * pTerm * spikyGrad * rx * invR;
          fPY += MASS * pTerm * spikyGrad * ry * invR;

          // 粘性力
          viscLap = VISC_L * (H - r);
          dvx = vx[j] - vx[i]; dvy = vy[j] - vy[i];
          fVX += myVisc * MASS * dvx / rhoJ * viscLap;
          fVY += myVisc * MASS * dvy / rhoJ * viscLap;
        }
      }
    }

    fxa[i] = fPX + fVX;
    fya[i] = fPY + fVY + rhoI * GRAV;
  }
}

// ===================== 鼠标搅拌 =====================
var mouseX = 0, mouseY = 0, prevMX = 0, prevMY = 0, mouseDown = false;
var MOUSE_R = 55, MOUSE_STR = 700;

function onPtrDown(x, y) { mouseDown = true; mouseX = prevMX = x; mouseY = prevMY = y; }
function onPtrUp() { mouseDown = false; }
function onPtrMove(x, y) { prevMX = mouseX; prevMY = mouseY; mouseX = x; mouseY = y; }

cvs.addEventListener('mousedown', function(e) {
  var r = cvs.getBoundingClientRect();
  onPtrDown(e.clientX - r.left, e.clientY - r.top);
});
cvs.addEventListener('mouseup', onPtrUp);
cvs.addEventListener('mouseleave', onPtrUp);
cvs.addEventListener('mousemove', function(e) {
  var r = cvs.getBoundingClientRect();
  onPtrMove(e.clientX - r.left, e.clientY - r.top);
});
cvs.addEventListener('touchstart', function(e) {
  e.preventDefault();
  var r = cvs.getBoundingClientRect(), t = e.touches[0];
  onPtrDown(t.clientX - r.left, t.clientY - r.top);
}, { passive: false });
cvs.addEventListener('touchend', onPtrUp);
cvs.addEventListener('touchmove', function(e) {
  e.preventDefault();
  var r = cvs.getBoundingClientRect(), t = e.touches[0];
  onPtrMove(t.clientX - r.left, t.clientY - r.top);
}, { passive: false });

function applyMouseForce() {
  if (!mouseDown) return;
  var dmx = mouseX - prevMX, dmy = mouseY - prevMY;
  if (dmx === 0 && dmy === 0) return;
  var mr2 = MOUSE_R * MOUSE_R, i, dx, dy, d2;
  for (i = 0; i < N; i++) {
    dx = px[i] - mouseX; dy = py[i] - mouseY;
    d2 = dx * dx + dy * dy;
    if (d2 < mr2) {
      var strength = MOUSE_STR * (1 - Math.sqrt(d2) / MOUSE_R);
      vx[i] += dmx * strength * DT;
      vy[i] += dmy * strength * DT;
    }
  }
}

// ===================== 时间积分 (Symplectic Euler) =====================
function integrate() {
  var i, invRho, v2, s;
  for (i = 0; i < N; i++) {
    invRho = 1 / rho[i];
    vx[i] += DT * fxa[i] * invRho;
    vy[i] += DT * fya[i] * invRho;
    // 速度限幅
    v2 = vx[i] * vx[i] + vy[i] * vy[i];
    if (v2 > MAX_VEL * MAX_VEL) {
      s = MAX_VEL / Math.sqrt(v2);
      vx[i] *= s; vy[i] *= s;
    }
    px[i] += DT * vx[i];
    py[i] += DT * vy[i];
  }
}

// ===================== 边界约束 =====================
function enforceBounds() {
  var i, dx, dy, dist, invDist, nx, ny, vn;
  for (i = 0; i < N; i++) {
    // 碗壁 — 半圆内侧
    dx = px[i] - BX; dy = py[i] - BY;
    dist = Math.sqrt(dx * dx + dy * dy);
    if (dist > BR - P_RAD && py[i] >= BY) {
      invDist = 1 / Math.max(dist, 0.01);
      nx = dx * invDist; ny = dy * invDist;
      px[i] = BX + nx * (BR - P_RAD);
      py[i] = BY + ny * (BR - P_RAD);
      vn = vx[i] * nx + vy[i] * ny;
      if (vn > 0) {
        vx[i] -= (1 + BOUNCE) * vn * nx;
        vy[i] -= (1 + BOUNCE) * vn * ny;
      }
    }
    // 画布边缘
    if (px[i] < P_RAD)       { px[i] = P_RAD;       vx[i] *= BOUNCE; }
    if (px[i] > W - P_RAD)  { px[i] = W - P_RAD;   vx[i] *= BOUNCE; }
    if (py[i] > HH - P_RAD) { py[i] = HH - P_RAD;  vy[i] *= BOUNCE; }
    if (py[i] < P_RAD)       { py[i] = P_RAD;       vy[i] *= BOUNCE; }
  }
}

// ===================== 渲染 =====================
// 预渲染粒子精灵 (径向渐变)
var SPRITE_R = (P_RAD * 3.2) | 0;
var spriteW = document.createElement('canvas');
var spriteX = document.createElement('canvas');
spriteW.width = spriteX.width  = SPRITE_R * 2;
spriteW.height = spriteX.height = SPRITE_R * 2;

(function createSprites() {
  var c, g;
  // 水 — 蓝色
  c = spriteW.getContext('2d');
  g = c.createRadialGradient(SPRITE_R, SPRITE_R, 0, SPRITE_R, SPRITE_R, SPRITE_R);
  g.addColorStop(0,    'rgba(100,195,255,0.95)');
  g.addColorStop(0.35,'rgba(50,130,255,0.70)');
  g.addColorStop(1,   'rgba(15,50,180,0)');
  c.fillStyle = g;
  c.fillRect(0, 0, SPRITE_R * 2, SPRITE_R * 2);

  // 蜡 — 橙黄色
  c = spriteX.getContext('2d');
  g = c.createRadialGradient(SPRITE_R, SPRITE_R, 0, SPRITE_R, SPRITE_R, SPRITE_R);
  g.addColorStop(0,    'rgba(255,220,80,0.95)');
  g.addColorStop(0.35,'rgba(255,155,30,0.70)');
  g.addColorStop(1,   'rgba(180,70,0,0)');
  c.fillStyle = g;
  c.fillRect(0, 0, SPRITE_R * 2, SPRITE_R * 2);
})();

function render() {
  var i;
  // 背景
  ctx.fillStyle = '#060610';
  ctx.fillRect(0, 0, W, HH);

  // 碗 — 半圆弧 + 内阴影 + 口沿高光
  ctx.save();
  var bowlGrad = ctx.createRadialGradient(BX, BY + BR * 0.55, 10, BX, BY, BR);
  bowlGrad.addColorStop(0, 'rgba(12,12,30,0.45)');
  bowlGrad.addColorStop(1, 'rgba(4,4,10,0.08)');
  ctx.beginPath();
  ctx.arc(BX, BY, BR - 2, 0, Math.PI);
  ctx.fillStyle = bowlGrad;
  ctx.fill();

  ctx.beginPath();
  ctx.arc(BX, BY, BR, 0, Math.PI);
  ctx.lineWidth = 4;
  ctx.strokeStyle = '#1e2540';
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(BX - BR, BY);
  ctx.lineTo(BX + BR, BY);
  ctx.lineWidth = 2;
  ctx.strokeStyle = 'rgba(80,100,150,0.22)';
  ctx.stroke();
  ctx.restore();

  // 粒子
  for (i = 0; i < N; i++) {
    ctx.drawImage(pt[i] === 0 ? spriteW : spriteX, px[i] - SPRITE_R, py[i] - SPRITE_R);
  }

  // 鼠标搅拌指示
  if (mouseDown) {
    ctx.beginPath();
    ctx.arc(mouseX, mouseY, MOUSE_R, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(255,255,255,0.12)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }
}

// ===================== 主循环 =====================
var fpsCount = 0, fpsTime = 0;

function mainLoop(timestamp) {
  fpsCount++;
  if (timestamp - fpsTime >= 1000) {
    document.getElementById('fps').textContent = fpsCount;
    fpsCount = 0;
    fpsTime = timestamp;
  }

  var s;
  for (s = 0; s < SUBSTEPS; s++) {
    buildGrid();
    computeDensityPressure();
    computeForces();
    applyMouseForce();
    integrate();
    enforceBounds();
  }

  render();
  requestAnimationFrame(mainLoop);
}

// ===================== 启动 =====================
initParticles();
requestAnimationFrame(mainLoop);
</script>


</body></html>
